; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; Quick commands (daily use):
;   Sim build (Wokwi):        pio run -e uno_sim
;   Nano build:               pio run -e nanoatmega328
;   Nano upload:              pio run -e nanoatmega328 -t upload
;   Serial monitor (9600):    pio device monitor -b 9600

; Global PlatformIO settings section.
[platformio]
; Default environment used when running `pio run` without `-e`.
default_envs = uno_sim

; Simulation environment for Wokwi (Arduino Uno + I2C LCD sketch).
[env:uno_sim]
; Platform package family for AVR-based boards.
platform = atmelavr
; Board definition for Arduino Uno.
board = uno
; Arduino framework/tooling for this environment.
framework = arduino
build_src_filter =
	; Exclude all default source files first.
	-<*>
	; Include only the Uno simulation source from the Wokwi folder.
	+<../Wokwi/uno_main.cpp>
; Start library dependency list for this environment.
lib_deps = 
	; I2C LCD library used by the simulation sketch.
	marcoschwartz/LiquidCrystal_I2C@^1.1.4

; Hardware environment for physical Arduino Nano (new bootloader).
[env:nanoatmega328]
; Platform package family for AVR-based boards.
platform = atmelavr
; Board definition for Nano ATmega328 (new bootloader).
board = nanoatmega328new
; Arduino framework/tooling for this environment.
framework = arduino
; Uses default `src/` discovery (builds `src/nano_main.cpp`).
; Start library dependency list for this environment.
lib_deps =
	; LiquidCrystal library required by the parallel LCD firmware.
	arduino-libraries/LiquidCrystal@^1.0.7
